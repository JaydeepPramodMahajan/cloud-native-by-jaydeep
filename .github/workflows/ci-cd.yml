name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code/Build Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Check Final
        run: echo "Done"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}
      - name: Debug
        run: |
                  pwd
                  ls -la
                  cat .github/workflows/ci-cd.yml    
            
      - name: Build Docker Image
        run: |
         docker build \
           -t ${{ secrets.DOCKER_USERNAME }}/cloud-native-by-jaydeep:latest \
           ./cloud-native-manager


      - name : Push Docker image
        run: docker push ${{secrets.DOCKER_USERNAME}}/cloud-native-by-jaydeep:latest
      - name : Final Docker Check
        run: echo "Docker Done"